name: Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${TAG}" ]]; then
            echo "Tag is required."
            exit 1
          fi

          VERSION="${TAG#v}"
          if [[ "${VERSION}" == *"-rc."* || "${VERSION}" == *"-test."* ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi
          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "prerelease=${PRERELEASE}"
          } >> "${GITHUB_OUTPUT}"

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - name: Build and package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          GOARCH="${{ matrix.goarch }}"
          ASSET="br_${VERSION}_linux_${GOARCH}.tar.gz"

          GOOS=linux GOARCH="${GOARCH}" CGO_ENABLED=0 go build \
            -ldflags "-s -w -X github.com/novr/bitrise-cli/internal/api.Version=${VERSION}" \
            -o br ./cmd/br

          mkdir -p dist
          cp ./br "./dist/br"
          tar -C dist -czf "${ASSET}" br

      - name: Upload platform asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: br-linux-${{ matrix.goarch }}
          path: br_${{ needs.prepare.outputs.version }}_linux_${{ matrix.goarch }}.tar.gz

  release-macos:
    needs: prepare
    runs-on: macos-latest
    outputs:
      url: ${{ steps.package.outputs.url }}
      sha256: ${{ steps.package.outputs.sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - name: Build universal release binary
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          LDFLAGS="-s -w -X github.com/novr/bitrise-cli/internal/api.Version=${VERSION}"

          mkdir -p dist
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -o dist/br-arm64 ./cmd/br
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -o dist/br-amd64 ./cmd/br
          lipo -create -output dist/br dist/br-arm64 dist/br-amd64
          lipo -info dist/br | grep -q 'Architectures in the fat file:.*arm64'
          lipo -info dist/br | grep -q 'Architectures in the fat file:.*x86_64'

      - name: Package release asset
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          ASSET="br_${VERSION}_darwin.tar.gz"

          tar -C dist -czf "${ASSET}" br
          SHA256="$(shasum -a 256 "${ASSET}" | cut -d' ' -f1)"
          echo "${SHA256}  ${ASSET}" > checksums.txt
          {
            echo "asset=${ASSET}"
            echo "sha256=${SHA256}"
            echo "url=https://github.com/novr/bitrise-cli/releases/download/${TAG}/${ASSET}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-macos
          path: |
            ${{ steps.package.outputs.asset }}
            checksums.txt

      - name: Create or update release with macOS assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.tag }}"
          TITLE="${TAG}"
          VERSION="${{ needs.prepare.outputs.version }}"
          ASSET="${{ steps.package.outputs.asset }}"

          delete_legacy_asset() {
            local name="$1"
            local api_url
            api_url="$(gh release view "${TAG}" --json assets -q ".assets[] | select(.name == \"${name}\") | .apiUrl" 2>/dev/null || true)"
            if [[ -n "${api_url}" ]]; then
              gh api -X DELETE "${api_url}"
            fi
          }

          if gh release view "${TAG}" >/dev/null 2>&1; then
            delete_legacy_asset "br_${VERSION}_darwin_arm64.tar.gz"
            delete_legacy_asset "br_${VERSION}_darwin_amd64.tar.gz"
            gh release upload "${TAG}" "${ASSET}" checksums.txt --clobber
          else
            if [[ "${{ needs.prepare.outputs.prerelease }}" == "true" ]]; then
              PRERELEASE_FLAG="--prerelease"
            else
              PRERELEASE_FLAG=""
            fi

            gh release create "${TAG}" \
              "${ASSET}" \
              checksums.txt \
              --target "${{ github.sha }}" \
              --generate-notes \
              --title "${TITLE}" \
              ${PRERELEASE_FLAG}
          fi

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.NOVRD_BOT_APP_ID }}
          private-key: ${{ secrets.NOVRD_BOT_KEY }}
          owner: novr
          repositories: homebrew-taps

      - name: Dispatch homebrew formula update
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          FORMULA_EVENT: ${{ vars.HOMEBREW_FORMULA_EVENT || 'add-formula' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${FORMULA_EVENT}" == "add-formula" ]]; then
            gh api repos/novr/homebrew-taps/dispatches \
              --method POST \
              --input - <<EOF
          {
            "event_type": "add-formula",
            "client_payload": {
              "formula": "br",
              "version": "${{ needs.prepare.outputs.version }}",
              "url": "${{ steps.package.outputs.url }}",
              "sha256": "${{ steps.package.outputs.sha256 }}",
              "source_repo": "novr/bitrise-cli",
              "desc": "Unofficial Bitrise CLI for build history and logs",
              "homepage": "https://github.com/novr/bitrise-cli",
              "binary": "br",
              "test_match": "Bitrise CLI"
            }
          }
          EOF
          else
            gh api repos/novr/homebrew-taps/dispatches \
              --method POST \
              --input - <<EOF
          {
            "event_type": "update-formula",
            "client_payload": {
              "formula": "br",
              "version": "${{ needs.prepare.outputs.version }}",
              "url": "${{ steps.package.outputs.url }}",
              "sha256": "${{ steps.package.outputs.sha256 }}",
              "source_repo": "novr/bitrise-cli",
              "binary": "br"
            }
          }
          EOF
          fi

  release-linux:
    needs: [prepare, build-linux, release-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          sparse-checkout: |
            .github
          sparse-checkout-cone-mode: false

      - name: Download Linux assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          pattern: br-linux-*
          merge-multiple: true

      - name: Upload Linux assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.tag }}"
          gh release upload "${TAG}" dist/br_*_linux_*.tar.gz --clobber
